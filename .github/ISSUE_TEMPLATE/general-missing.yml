name: General / Missing
description: Use this when the report does not fit another form.
title: "[General/Missing]: "
labels:
  - "component: General/Missing"
  - "status: backlog"
projects:
  - "pmanaseri/4"
body:
  - type: dropdown
    id: report-type
    attributes:
      label: Report Type
      options:
        - Bug
        - Feature idea
        - Question
        - Missing page or data
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: closest-area
    attributes:
      label: Closest Area
      options:
        - Banner
        - Owners Directory
        - Salary Dashboard
        - League Analytics
        - Team Front Office
        - Press Box
        - Salary Report
        - Trade Block
        - Roster
        - Transactions
        - Draft Board
        - Alerts
        - Backend/Data
        - Identity/Owners
        - Rosters
        - Salary Manager
        - League Data
        - Matchups/Standings
        - Drafts/Picks
        - Calendar/Scoring
        - General/Missing
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What Should We Know?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or URL
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Screenshots / Recordings
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
    validations:
      required: false
