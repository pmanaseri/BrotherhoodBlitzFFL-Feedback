name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels:
  - "type: feature"
  - "status: new"
projects:
  - "pmanaseri/4"
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest site area.
      options:
        - Banner
        - Owners Directory
        - Salary Dashboard
        - League Analytics
        - Team Front Office
        - Press Box
        - Salary Report
        - Trade Block
        - Roster
        - Transactions
        - Draft Board
        - Alerts
        - Backend/Data
        - Identity/Owners
        - Rosters
        - Salary Manager
        - League Data
        - Matchups/Standings
        - Drafts/Picks
        - Calendar/Scoring
        - General/Missing
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What Should Be Added Or Improved?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why Would This Help The League?
      description: Describe the league workflow, confusion, or benefit.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Desired Behavior
      description: What should the site do when this exists?
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Importance
      options:
        - Nice polish
        - Useful soon
        - Important for league usage
        - Not sure
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
    validations:
      required: false
