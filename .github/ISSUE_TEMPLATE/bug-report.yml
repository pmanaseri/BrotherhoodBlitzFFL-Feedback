name: Bug Report
description: Report something broken or behaving incorrectly.
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: new"
projects:
  - "pmanaseri/3"
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest site area.
      options:
        - Banner
        - Owners Directory
        - Salary Dashboard
        - League Analytics
        - Team Front Office
        - Press Box
        - Salary Report
        - Trade Block
        - Roster
        - Transactions
        - Draft Board
        - Alerts
        - Backend/Data
        - Identity/Owners
        - Rosters
        - Salary Manager
        - League Data
        - Matchups/Standings
        - Drafts/Picks
        - Calendar/Scoring
        - General/Missing
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or URL
      description: Where did this happen?
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the actions that trigger the issue.
      placeholder: |
        1. Open the affected page
        2. Click or view the affected area
        3. See the incorrect behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Main Impact
      description: Pick the closest symptom.
      options:
        - UI
        - Visual
        - Speed
        - Mobile
        - Data/Stats
        - Access/Login
        - Copy/Content
        - Not sure
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Device / Browser
      description: Include browser, device, and operating system if relevant.
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Screenshots / Recordings
      description: Add screenshots or screen recordings if they help show the issue.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add anything else that may help.
    validations:
      required: false
